kind = "web"
previewPath = "/"
title = "3 Year Anniversary"
version = "1.0.0"
id = "artifacts/anniversary-wrapped"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22793

[services.development]
run = "pnpm --filter @workspace/anniversary-wrapped run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anniversary-wrapped", "run", "build" ]
publicDir = "artifacts/anniversary-wrapped/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22793"
BASE_PATH = "/"
